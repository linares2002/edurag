  <text x="843" y="537" text-anchor="middle" font-size="8" fill="#334155">openid</text>

  <rect x="925" y="445" width="140" height="100" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="995" y="462" text-anchor="middle" font-size="10" font-weight="bold" fill="#9a3412">Cloudflare Turnstile</text>
  <text x="995" y="477" text-anchor="middle" font-size="8" fill="#334155">challenges.cloudflare</text>
  <text x="995" y="492" text-anchor="middle" font-size="8" fill="#334155">.com/turnstile/v0/</text>
  <text x="995" y="507" text-anchor="middle" font-size="8" fill="#334155">siteverify</text>
  <text x="995" y="522" text-anchor="middle" font-size="8" fill="#334155">CAPTCHA invisible</text>
  <text x="995" y="537" text-anchor="middle" font-size="8" fill="#334155">Cookie 48h exemption</text>

  <!-- ===== BASE DE DATOS ===== -->
  <rect x="390" y="575" width="350" height="80" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="565" y="597" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Database &amp; Files</text>
  <text x="565" y="614" text-anchor="middle" font-size="9" fill="#334155">SQLite (data/metrics.db): usage_metrics — sessions, queries, response times</text>
  <text x="565" y="629" text-anchor="middle" font-size="9" fill="#334155">data/markers.json: AR definitions · documents/: PDF corpus · .ingested_records.json</text>
  <text x="565" y="644" text-anchor="middle" font-size="9" fill="#334155">barcodes/: images 0-63 · locales/es.json · locales/en.json</text>

  <!-- ===== DOCKER ===== -->
  <rect x="20" y="445" width="340" height="95" rx="12" fill="#f0f4ff" stroke="#4f46e5" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="467" text-anchor="middle" font-size="13" font-weight="bold" fill="#4f46e5">Docker Compose</text>
  <rect x="35" y="475" width="145" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="108" y="492" text-anchor="middle" font-size="9" font-weight="bold" fill="#3730a3">ChromaDB container</text>
  <text x="108" y="507" text-anchor="middle" font-size="8" fill="#334155">chromadb/chroma:1.5.5</text>
  <text x="108" y="520" text-anchor="middle" font-size="8" fill="#334155">Puerto 8000 · vol chroma_data</text>
  <rect x="195" y="475" width="150" height="50" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="270" y="492" text-anchor="middle" font-size="9" font-weight="bold" fill="#3730a3">Ollama/llama.cpp</text>
  <text x="270" y="507" text-anchor="middle" font-size="8" fill="#334155">ggml-org/llama.cpp:server</text>
  <text x="270" y="520" text-anchor="middle" font-size="8" fill="#334155">Puerto 8080 · 6GB RAM · 8K ctx</text>

  <!-- ===== FLECHAS ===== -->
  <!-- Browser → Backend HTTP -->
  <line x1="360" y1="200" x2="388" y2="200" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="374" y="195" text-anchor="middle" font-size="8" fill="#0284c7">HTTPS</text>

  <!-- Backend → ChromaDB -->
  <line x1="740" y1="150" x2="773" y2="148" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="757" y="143" text-anchor="middle" font-size="8" fill="#16a34a">HTTP</text>

  <!-- Backend → LLM -->
  <line x1="740" y1="250" x2="773" y2="248" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="757" y="243" text-anchor="middle" font-size="8" fill="#16a34a">API</text>

  <!-- Backend → YOLO -->
  <line x1="740" y1="345" x2="773" y2="345" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Backend → Auth External -->
  <line x1="740" y1="435" x2="773" y2="490" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Backend → SQLite -->
  <line x1="565" y1="560" x2="565" y2="573" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Docker → Backend -->
  <line x1="360" y1="490" x2="388" y2="420" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

