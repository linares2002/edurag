  <text x="40" y="754" font-size="9" fill="#334155">AR: A-Frame 1.2.0 + AR.js 3.3.3 · Barcode markers 3×3 · YOLOv8n: 80 COCO classes → academic topics · TTS: SpeechSynthesis API</text>
