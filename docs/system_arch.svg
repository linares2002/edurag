<svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">AVATAR — System Architecture</text>
  <text x="550" y="52" text-anchor="middle" font-size="12" fill="#64748b">Augmented Reality System with RAG and Generative AI · PIMED 2025 · University of Jaén</text>

  <!-- ===== BROWSER / CLIENTE ===== -->
  <rect x="20" y="70" width="340" height="360" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="190" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#0284c7">WEB BROWSER (Client)</text>

  <!-- Panel AR -->
  <rect x="35" y="100" width="145" height="150" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
  <text x="108" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">Panel AR</text>
  <text x="108" y="133" text-anchor="middle" font-size="9" fill="#0369a1">A-Frame 1.2.0</text>
  <text x="108" y="148" text-anchor="middle" font-size="9" fill="#334155">• AR.js 3.3.3</text>
  <text x="108" y="163" text-anchor="middle" font-size="9" fill="#334155">• • Barcode markers</text>
  <text x="108" y="178" text-anchor="middle" font-size="9" fill="#334155">• • 3D Objects / textures</text>
  <text x="108" y="193" text-anchor="middle" font-size="9" fill="#334155">• • Environment camera</text>
  <text x="108" y="208" text-anchor="middle" font-size="9" fill="#334155">• getUserMedia()</text>
  <text x="108" y="223" text-anchor="middle" font-size="9" fill="#334155">• • YOLO detect. button</text>
  <text x="108" y="238" text-anchor="middle" font-size="9" fill="#334155">• • Detection badge</text>

  <!-- Panel Chat -->
  <rect x="195" y="100" width="150" height="150" rx="8" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5"/>
  <text x="270" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#0369a1">Panel Chat</text>
  <text x="270" y="133" text-anchor="middle" font-size="9" fill="#0369a1">FSM State Machine</text>
  <text x="270" y="148" text-anchor="middle" font-size="9" fill="#334155">• • Text/voice input</text>
  <text x="270" y="163" text-anchor="middle" font-size="9" fill="#334155">• SpeechRecognition API</text>
  <text x="270" y="178" text-anchor="middle" font-size="9" fill="#334155">• • Microphone selection</text>
  <text x="270" y="193" text-anchor="middle" font-size="9" fill="#334155">• formatMarkdown()</text>
  <text x="270" y="208" text-anchor="middle" font-size="9" fill="#334155">• • Animated spinner</text>
  <text x="270" y="223" text-anchor="middle" font-size="9" fill="#334155">• • Auto-scroll messages</text>
  <text x="270" y="238" text-anchor="middle" font-size="9" fill="#334155">• aria-live="polite"</text>

  <!-- TTS / UI bar -->
  <rect x="35" y="265" width="310" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="190" y="283" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">TTS · i18n · localStorage Metrics</text>
  <text x="190" y="298" text-anchor="middle" font-size="9" fill="#334155">SpeechSynthesis API · es-ES/en-US · Batch metrics (every 5 queries)</text>

  <!-- Login -->
  <rect x="35" y="330" width="310" height="85" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="190" y="348" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Login / Authentication</text>
  <text x="190" y="363" text-anchor="middle" font-size="9" fill="#334155">• Cloudflare Turnstile (invisible CAPTCHA)</text>
  <text x="190" y="378" text-anchor="middle" font-size="9" fill="#334155">• • Google SSO Button</text>
  <text x="190" y="393" text-anchor="middle" font-size="9" fill="#334155">• • Cookie exemption 48h · OAuth Redirect</text>
  <text x="190" y="408" text-anchor="middle" font-size="9" fill="#334155">• • Roles: student (@red.ujaen.es) / teacher (@ujaen.es)</text>

  <!-- ===== FASTAPI BACKEND ===== -->
  <rect x="390" y="70" width="350" height="490" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="565" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#16a34a">BACKEND — FastAPI + Uvicorn</text>
  <text x="565" y="108" text-anchor="middle" font-size="10" fill="#64748b">Python 3.11 · Port 5000</text>

  <!-- Routers -->
  <rect x="405" y="115" width="320" height="260" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
  <text x="565" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Routers (API Endpoints)</text>

  <rect x="415" y="140" width="140" height="55" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="485" y="156" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">POST /bot</text>
  <text x="485" y="169" text-anchor="middle" font-size="8" fill="#334155">RAG query · 30 req/min</text>
  <text x="485" y="182" text-anchor="middle" font-size="8" fill="#334155">LangChain + ChromaDB</text>

  <rect x="570" y="140" width="145" height="55" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="643" y="156" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">POST /vision/detect</text>
  <text x="643" y="169" text-anchor="middle" font-size="8" fill="#334155">YOLOv8n inference</text>
  <text x="643" y="182" text-anchor="middle" font-size="8" fill="#334155">Base64 JPEG → label</text>

  <rect x="415" y="205" width="140" height="55" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="485" y="221" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">GET/POST /auth</text>
  <text x="485" y="234" text-anchor="middle" font-size="8" fill="#334155">Turnstile check</text>
  <text x="485" y="247" text-anchor="middle" font-size="8" fill="#334155">OAuth callback · Logout</text>

  <rect x="570" y="205" width="145" height="55" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="643" y="221" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">GET /markers/{id}</text>
  <text x="643" y="234" text-anchor="middle" font-size="8" fill="#334155">markers.json · img/</text>
  <text x="643" y="247" text-anchor="middle" font-size="8" fill="#334155">200 req/min</text>

  <rect x="415" y="270" width="140" height="55" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="485" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">POST /metrics</text>
  <text x="485" y="299" text-anchor="middle" font-size="8" fill="#334155">SQLite insert</text>
  <text x="485" y="312" text-anchor="middle" font-size="8" fill="#334155">GET /metrics/summary</text>

  <rect x="570" y="270" width="145" height="55" rx="6" fill="white" stroke="#4ade80" stroke-width="1"/>
  <text x="643" y="286" text-anchor="middle" font-size="9" font-weight="bold" fill="#166534">GET /dashboard</text>
  <text x="643" y="299" text-anchor="middle" font-size="8" fill="#334155">Jinja2 templates</text>
  <text x="643" y="312" text-anchor="middle" font-size="8" fill="#334155">i18n · markers list</text>

  <!-- Middleware / State -->
  <rect x="405" y="385" width="320" height="75" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="565" y="403" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Middleware &amp; Global State (state.py)</text>
  <text x="565" y="418" text-anchor="middle" font-size="9" fill="#334155">SessionMiddleware (signed cookies) · _PermissionsMiddleware (camera/mic)</text>
  <text x="565" y="433" text-anchor="middle" font-size="9" fill="#334155">slowapi RateLimiter · ChromaRAGSystem · LLMSystem · OAuth</text>
  <text x="565" y="448" text-anchor="middle" font-size="9" fill="#334155">Lifespan: init ChromaDB + LLM + OAuth on startup</text>

  <!-- i18n / PDF -->
  <rect x="405" y="470" width="320" height="75" rx="8" fill="#bbf7d0" stroke="#22c55e" stroke-width="1"/>
  <text x="565" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Auxiliary Modules</text>
  <text x="565" y="503" text-anchor="middle" font-size="9" fill="#334155">i18n.py: es.json / en.json · Accept-Language header</text>
  <text x="565" y="518" text-anchor="middle" font-size="9" fill="#334155">pdf_functions.py: PyPDF/PyMuPDF/pdfplumber · hybrid chunking</text>
  <text x="565" y="533" text-anchor="middle" font-size="9" fill="#334155">rag_manager.py: CLI ingestion · SHA-256 hash · .ingested_records.json</text>

  <!-- ===== AI / ML ===== -->
  <rect x="760" y="70" width="320" height="330" rx="12" fill="#faf5ff" stroke="#9333ea" stroke-width="2" filter="url(#shadow)"/>
  <text x="920" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#9333ea">IA / ML</text>

  <!-- ChromaDB -->
  <rect x="775" y="100" width="290" height="95" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="920" y="118" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">ChromaDB 1.5.5</text>
  <text x="920" y="133" text-anchor="middle" font-size="9" fill="#334155">Vector Store · Puerto 8000 · Docker</text>
  <text x="920" y="148" text-anchor="middle" font-size="9" fill="#334155">Collection: scientific_articles</text>
  <text x="920" y="163" text-anchor="middle" font-size="9" fill="#334155">Embeddings: all-MiniLM-L6-v2 (384 dims)</text>
  <text x="920" y="178" text-anchor="middle" font-size="9" fill="#334155">min_score: 0.65 · max_results: 8</text>

  <!-- LLM -->
  <rect x="775" y="205" width="290" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="920" y="223" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">LLM Factory (llm_factory.py)</text>
  <text x="920" y="238" text-anchor="middle" font-size="9" fill="#334155">Anthropic Claude (claude-haiku-4-5)</text>
  <text x="920" y="253" text-anchor="middle" font-size="9" fill="#334155">OpenAI GPT-4o-mini</text>
  <text x="920" y="268" text-anchor="middle" font-size="9" fill="#334155">Ollama/llama.cpp (Gemma 3B · 8192 ctx)</text>
  <text x="920" y="283" text-anchor="middle" font-size="9" fill="#334155">LangChain · Academic prompt 120 lines</text>

  <!-- YOLO -->
  <rect x="775" y="305" width="290" height="85" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="920" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">YOLOv8n (vision.py)</text>
  <text x="920" y="338" text-anchor="middle" font-size="9" fill="#334155">ultralytics · 0.3M params · CPU ~7ms</text>
  <text x="920" y="353" text-anchor="middle" font-size="9" fill="#334155">COCO 80 classes → academic topics</text>
  <text x="920" y="368" text-anchor="middle" font-size="9" fill="#334155">Confidence: 0.35 · Lazy loading</text>
  <text x="920" y="383" text-anchor="middle" font-size="9" fill="#334155">Input: 640×480 JPEG base64</text>

  <!-- ===== SERVICIOS EXTERNOS ===== -->
  <rect x="760" y="415" width="320" height="145" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="920" y="437" text-anchor="middle" font-size="13" font-weight="bold" fill="#ea580c">External Services</text>

  <rect x="775" y="445" width="135" height="100" rx="8" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
